{% from "partials/index/_macros.html" import action_btn %}
<div id="setup">
  <h2><img src="/static/Logo-BlackOutJack.png" alt="Black-Out-Jack Logo" class="setup-logo" /> Black-Out-Jack</h2>
  <p class="sub" id="setup-sub" data-copy="setupSub">Virtual Drinking Blackjack</p>

  <div id="setup-room-code-wrap">
    <p class="setup-room-hint">Room Code — share with friends to let them join</p>
    <div id="setup-room-code" class="room-code-badge"></div>
  </div>

  <div class="field">
    <label>Game Mode</label>
    <div id="gametype-row">
      <button class="btn sel" data-action="setGameType" data-args='["drinking-digital"]'>🍺 Drinking</button>
      <button class="btn" data-action="setGameType" data-args='["normal"]'>🃏 Normal</button>
      <button class="btn" data-action="setGameType" data-args='["referee"]'>📋 Referee</button>
    </div>
  </div>

  <div id="name-fields" class="field"></div>
  <button class="btn" style="width:100%;max-width:420px" data-action="addPlayerRow">+ Add Player</button>

  <div id="settings-ref" class="two-col">
    <div class="field field-unbounded">
      <label>Sips / hand</label>
      <input type="number" id="wager-ref" value="1" min="1" max="10">
    </div>
    <div class="field field-unbounded">
      <label>Hands / player</label>
      <input type="number" id="num-hands-ref" value="2" min="1" max="4">
    </div>
  </div>

  <div id="settings-dig" class="three-col">
    <div class="field field-unbounded" id="wager-dig-cell">
      <label>Sips / hand</label>
      <input type="number" id="wager-dig" value="1" min="1" max="10">
    </div>
    <div class="field field-unbounded">
      <label>Hands / player</label>
      <input type="number" id="num-hands-dig" value="2" min="1" max="4">
    </div>
    <div class="field field-unbounded">
      <label>Decks in shoe</label>
      <input type="number" id="num-decks" value="1" min="1" max="8">
    </div>
    <div class="field field-unbounded field-top-pad">
      <label class="compact-label">Animation</label>
      <div class="pill-toggle-wrap">
        <label class="pill-toggle">
          <input type="checkbox" id="anim-toggle" checked data-change-action="setAnimToggle">
          <span class="pill-slider"></span>
        </label>
        <span class="pill-label-off" id="anim-lbl-setup">OFF</span>
        <span class="pill-label-on" id="anim-lbl-setup-on">ON</span>
      </div>
    </div>
    <div class="field field-unbounded field-top-pad">
      <label class="compact-label">Bust vote</label>
      <div class="pill-toggle-wrap">
        <label class="pill-toggle">
          <input type="checkbox" id="bust-vote-setup-toggle" checked data-change-action="setBustVoteSetupToggle">
          <span class="pill-slider"></span>
        </label>
        <span class="pill-label-off" id="bust-vote-lbl-setup" style="display:none">OFF</span>
        <span class="pill-label-on" id="bust-vote-lbl-setup-on">ON</span>
      </div>
    </div>
  </div>

  {{ action_btn('Start Game', 'startGame', '[]', 'btn-primary-start', 'id="start-btn"') }}
  <button class="btn muted-btn wide" style="margin-top:8px" data-action="cancelSetup">← Back to Lobby</button>
</div>
