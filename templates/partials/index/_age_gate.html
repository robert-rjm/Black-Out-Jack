<div id="age-gate">
  <div id="age-gate-card">
    <div class="gate-logo">
      <img src="/static/Logo-BlackOutJack.png" alt="Black-Out-Jack Logo"/>
    </div>
    <h1>Black-Out-Jack</h1>
    <p class="gate-sub" data-copy="tagline">Drinking Blackjack with friends</p>

    <div class="gate-legal">
      <p>This game involves alcohol. </p>
      <p>You must be <strong>18+ or of legal drinking age</strong> to play.</p>

      <p>By continuing, you confirm you are of the legal age.</p>

    </div>

    <button class="gate-btn-confirm pressable" data-action="confirmAge">I am 18 or older →</button>
    <div id="age-gate-msg"></div>
    <button class="gate-btn-decline" data-action="declineAge">I am under 18</button>
  </div>
</div>
